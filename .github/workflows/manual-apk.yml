name: Manual APK Generation

on:
  workflow_dispatch:
    inputs:
      versionName:
        description: 'Version Name'
        required: true
        default: '1.1-debug'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Build Debug APK
      run: ./gradlew assembleDebug -PversionName=${{ github.event.inputs.versionName }} --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: manual-apk-${{ github.event.inputs.versionName }}
        path: app/build/outputs/apk/debug/*.apk
