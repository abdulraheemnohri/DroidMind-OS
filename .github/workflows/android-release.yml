name: Android Release

on:
  push:
    branches: [ main ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Determine Next Version
      id: next_version
      run: |
        latest_tag=$(git describe --tags --abbrev=0 2>/dev/null)
        if [ -z "$latest_tag" ]; then
          new_tag="v0.1.0"
        else
          echo "Latest tag: $latest_tag"
          version=${latest_tag#v}
          IFS='.' read -r major minor patch <<< "$version"

          # Increment minor version as requested (v0.1.0 -> v0.2.0)
          new_minor=$((minor + 1))
          new_tag="v$major.$new_minor.0"
        fi

        echo "New tag: $new_tag"
        echo "tag=$new_tag" >> $GITHUB_OUTPUT

    - name: Build APK
      run: ./gradlew assembleRelease --no-daemon
      env:
        VERSION_NAME: ${{ steps.next_version.outputs.tag }}

    - name: Sign APK (Debug Sign for Testing)
      run: |
        # In a real production setup, use a real keystore.
        # For now, we use the debug key to ensure the APK is installable.
        # This is a workaround since 'assembleRelease' produces an unsigned APK by default.
        cp app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/droidmind-os-${{ steps.next_version.outputs.tag }}.apk
        # We'll actually just build the debug version which is signed by default
        ./gradlew assembleDebug --no-daemon
        cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/release/droidmind-os-debug-${{ steps.next_version.outputs.tag }}.apk

    - name: Create Git Tag
      run: |
        git config user.name "GitHub Action"
        git config user.email "action@github.com"
        git tag ${{ steps.next_version.outputs.tag }}
        git push origin ${{ steps.next_version.outputs.tag }}

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.next_version.outputs.tag }}
        files: |
          app/build/outputs/apk/release/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
